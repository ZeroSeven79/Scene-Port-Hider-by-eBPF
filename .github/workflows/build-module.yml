name: HiderScenePort-eBPF-Build

run-name: HiderScenePort-${{ inputs.version }}_${{ inputs.codename }}-${{ inputs.device }}_${{ inputs.os_version }}

on:
  workflow_dispatch:
    inputs:
      codename:
        description: "机型代号"
        required: true
        type: string
        default: ""
      device:
        description: "设备型号"
        required: true
        type: string
        default: ""
      os_version:
        description: "系统版本"
        required: true
        type: string
        default: ""
      version:
        description: "模块版本"
        required: true
        type: string
        default: ""
      release_body:
        description: "发布内容"
        required: false
        type: string
        default: ""
      create_release:
        description: "构建完成后在Github发布"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host tools
        run: |
          sudo apt update
          sudo apt install -y clang llvm lld xxd pkg-config autoconf automake libtool

      - name: Install bpftool
        run: |
          BPFTOOL_VERSION="v7.7.0"
          curl -fL --retry 3 \
            "https://github.com/libbpf/bpftool/releases/download/${BPFTOOL_VERSION}/bpftool-${BPFTOOL_VERSION}-amd64.tar.gz" \
            -o "$RUNNER_TEMP/bpftool.tar.gz"
          mkdir -p "$RUNNER_TEMP/bpftool"
          tar -xzf "$RUNNER_TEMP/bpftool.tar.gz" -C "$RUNNER_TEMP/bpftool"
          BPFTOOL_PATH="$(find "$RUNNER_TEMP/bpftool" -type f -name bpftool | head -n 1)"
          chmod +x "$BPFTOOL_PATH"
          echo "BPFTOOL=$BPFTOOL_PATH" >> "$GITHUB_ENV"
          "$BPFTOOL_PATH" version

      - name: Cache Android arm64 dependencies
        uses: actions/cache@v4
        with:
          path: ~/hideport-deps
          key: hideport-deps-r25c-${{ runner.os }}-${{ hashFiles('build_deps_android.sh') }}

      - name: Build module from BTF
        run: |
          bash tools/build_from_btf.sh

      - name: Stage module zip
        run: |
          FULL_NAME="HiderScenePort-${{ inputs.version }}_${{ inputs.codename }}-${{ inputs.device }}_${{ inputs.os_version }}"
          cp ../hiderSceneport_module.zip "./${FULL_NAME}.zip"
          ls -lh "./${FULL_NAME}.zip"
          echo "ZIP_FILENAME=${FULL_NAME}.zip" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=${FULL_NAME}" >> "$GITHUB_ENV"

      - name: Unzip module for artifact
        run: |
          mkdir -p ./module_files
          unzip "./${{ env.ZIP_FILENAME }}" -d ./module_files

      - name: Upload module to Actions Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_NAME }}
          path: ./module_files/
          if-no-files-found: error

      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_NAME }}
          name: ${{ env.RELEASE_NAME }}
          body: ${{ inputs.release_body }}
          files: ${{ env.ZIP_FILENAME }}
          
