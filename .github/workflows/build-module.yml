name: HideScenePort-v2.0.1_haotian-Xiaomi15Pro_OS3.0.301.0.WOBCNXM

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "构建完成后在Github发布"
        required: true
        type: boolean
        default: false
      release_tag:
        description: "↑ 当勾选构建完成发布时，将创建发布标签。"
        required: false
        type: string
        default: "v2.0.1"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host tools
        run: |
          sudo apt update
          sudo apt install -y clang llvm lld xxd pkg-config autoconf automake libtool

      - name: Install bpftool
        run: |
          BPFTOOL_VERSION="v7.7.0"
          curl -fL --retry 3 \
            "https://github.com/libbpf/bpftool/releases/download/${BPFTOOL_VERSION}/bpftool-${BPFTOOL_VERSION}-amd64.tar.gz" \
            -o "$RUNNER_TEMP/bpftool.tar.gz"
          mkdir -p "$RUNNER_TEMP/bpftool"
          tar -xzf "$RUNNER_TEMP/bpftool.tar.gz" -C "$RUNNER_TEMP/bpftool"
          BPFTOOL_PATH="$(find "$RUNNER_TEMP/bpftool" -type f -name bpftool | head -n 1)"
          chmod +x "$BPFTOOL_PATH"
          echo "BPFTOOL=$BPFTOOL_PATH" >> "$GITHUB_ENV"
          "$BPFTOOL_PATH" version

      - name: Cache Android arm64 dependencies
        uses: actions/cache@v4
        with:
          path: ~/hideport-deps
          key: hideport-deps-r25c-${{ runner.os }}-${{ hashFiles('build_deps_android.sh') }}

      - name: Build module from BTF
        run: |
          bash tools/build_from_btf.sh

      - name: Stage module zip
        run: |
          cp ../hideSceneport_module.zip ./HideScenePort-v2.0.1_haotian-Xiaomi15Pro_OS3.0.301.0.WOBCNXM.zip
          ls -lh ./HideScenePort-v2.0.1_haotian-Xiaomi15Pro_OS3.0.301.0.WOBCNXM.zip

      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: HideScenePort-v2.0.1_haotian-Xiaomi15Pro_OS3.0.301.0.WOBCNXM
          body: |
            HideScenePort-v2.0.1
            haotian-Xiaomi15Pro_OS3.0.301.0.WOBCNXM
          files: HideScenePort-v2.0.1_haotian-Xiaomi15Pro_OS3.0.301.0.WOBCNXM.zip
          
